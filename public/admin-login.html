<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0f0f1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-card {
      background: linear-gradient(145deg, #1a1a2e, #16213e);
      border: 1px solid rgba(255,215,0,0.2);
      border-radius: 24px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.5);
    }
    .logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo h1 { color: #ffd700; font-size: 24px; font-weight: 700; }
    .logo p { color: #8892b0; font-size: 14px; margin-top: 4px; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; color: #ccd6f6; font-size: 13px; font-weight: 500; margin-bottom: 6px; }
    .form-group input {
      width: 100%;
      padding: 12px 16px;
      background: #0a0a1a;
      border: 1px solid #2a2a4a;
      border-radius: 12px;
      color: #fff;
      font-size: 15px;
      transition: all 0.3s;
    }
    .form-group input:focus { outline: none; border-color: #ffd700; box-shadow: 0 0 0 3px rgba(255,215,0,0.1); }
    .form-group input::placeholder { color: #4a4a6a; }
    .btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #ffd700, #f0c000);
      border: none;
      border-radius: 12px;
      color: #0a0a1a;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(255,215,0,0.3); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .error { color: #ff6b6b; font-size: 13px; text-align: center; margin-top: 12px; display: none; }
    .error.show { display: block; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo">
      <h1>⚽ Admin Panel</h1>
      <p>Football Coin Predictor</p>
    </div>
    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" value="mdswampodsarkar@gmail.com" placeholder="Admin email" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Password" required>
      </div>
      <div class="error" id="errorMsg">Invalid credentials</div>
      <button type="submit" class="btn" id="loginBtn">Sign In</button>
    </form>
  </div>

  <script>
    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const error = document.getElementById('errorMsg');
      btn.disabled = true;
      btn.textContent = 'Signing in...';
      error.classList.remove('show');

      try {
        const res = await fetch('/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('email').value,
            password: document.getElementById('password').value
          })
        });
        const data = await res.json();
        if (data.success) {
          localStorage.setItem('adminToken', data.token);
          window.location.href = '/admin';
        } else {
          error.textContent = 'Invalid email or password';
          error.classList.add('show');
        }
      } catch (err) {
        error.textContent = 'Connection error';
        error.classList.add('show');
      }
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  </script>
</body>
</html>
